<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>为什么章鱼被称为海里的外星人？</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #D1F2EB;
      display: flex;
      justify-content: center;
      padding: 40px;
      min-height: 100vh;
      min-width: 620px;
      overflow-x: hidden;
    }

    /* 3:4 卡片 宽540px，高度自适应 */
    .card {
      width: 540px;
      min-width: 540px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.15);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ── 顶部栏 ── */
    .top-bar {
      background: #0E4D64;
      padding: 16px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .top-bar .series {
      font-size: 11px;
      color: #48C9B0;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 600;
    }
    .top-bar .issue {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 1px;
    }

    /* ── Hero 区 ── */
    .hero {
      background: linear-gradient(160deg, #0E4D64 0%, #1A7A8C 60%, #48C9B0 100%);
      padding: 36px 32px 32px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: "?";
      position: absolute;
      right: 10px;
      bottom: -20px;
      font-size: 160px;
      font-weight: 900;
      color: rgba(255,255,255,0.05);
      line-height: 1;
      font-style: italic;
    }
    .hero-tag {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      color: #76D7C4;
      font-size: 11px;
      letter-spacing: 2px;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 16px;
      text-transform: uppercase;
    }
    .hero-title {
      font-size: 30px;
      font-weight: 800;
      color: #fff;
      line-height: 1.35;
      letter-spacing: -0.5px;
    }
    .hero-title em {
      font-style: normal;
      color: #76D7C4;
    }
    .hero-sub {
      margin-top: 14px;
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      line-height: 1.6;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .hero-sub::before {
      content: "";
      display: inline-block;
      width: 24px;
      height: 1px;
      background: #48C9B0;
      flex-shrink: 0;
    }

    /* ── 核心发现区 ── */
    .discovery {
      padding: 22px 32px 16px;
      flex-shrink: 0;
    }
    .discovery-label {
      font-size: 10px;
      color: #48C9B0;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .discovery-fact {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }
    .fact-num {
      font-size: 56px;
      font-weight: 900;
      color: #0E4D64;
      line-height: 1;
      letter-spacing: -2px;
    }
    .fact-num span {
      font-size: 28px;
      color: #48C9B0;
    }
    .fact-caption {
      font-size: 14px;
      color: #555;
      line-height: 1.6;
    }
    .fact-caption strong {
      color: #0E4D64;
      font-weight: 600;
    }

    /* ── 分割线 ── */
    .divider {
      margin: 0 32px;
      height: 1px;
      background: linear-gradient(90deg, #48C9B0, transparent);
      flex-shrink: 0;
    }

    /* ── 四宫格机制 ── */
    .mechanisms {
      padding: 16px 32px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      flex-shrink: 0;
    }
    .mech-card {
      background: #E8F6F3;
      border-radius: 10px;
      padding: 12px 14px;
      border-bottom: 2px solid #A3E4D7;
    }
    .mech-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }
    .mech-icon { font-size: 18px; }
    .mech-title {
      font-size: 13px;
      font-weight: 700;
      color: #0E4D64;
    }
    .mech-text {
      font-size: 11px;
      color: #777;
      line-height: 1.5;
    }

    /* ── 趣味冷知识 ── */
    .fun-fact {
      margin: 0 32px 20px;
      background: linear-gradient(135deg, #0E4D64, #1A7A8C);
      border-radius: 12px;
      padding: 14px 18px;
      flex-shrink: 0;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .fun-icon {
      font-size: 20px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .fun-content {}
    .fun-label {
      font-size: 10px;
      color: #48C9B0;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 5px;
    }
    .fun-text {
      font-size: 13px;
      color: rgba(255,255,255,0.85);
      line-height: 1.6;
    }

    /* ── 底部 ── */
    .footer {
      margin-top: auto;
      padding: 14px 32px;
      background: #E8F6F3;
      border-top: 1px solid #A3E4D7;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .footer-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #48C9B0;
    }
    .footer-date {
      font-size: 12px;
      color: #888;
    }
    .footer-right {
      font-size: 11px;
      color: #48C9B0;
      font-weight: 600;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="top-bar">
      <span class="series">每日一个为什么</span>
      <span class="issue">VOL.021 · 海洋生物学</span>
    </div>

    <div class="hero">
      <div class="hero-tag">🐙 海洋生物</div>
      <div class="hero-title">为什么<br><em>章鱼被称为海里的外星人</em></div>
      <div class="hero-sub">基因学上它确实不像地球生物</div>
    </div>

    <div class="discovery">
      <div class="discovery-label">核心发现</div>
      <div class="discovery-fact">
        <div class="fact-num">3<span>颗心脏</span></div>
        <div class="fact-caption">蓝色血液+9个大脑<br><strong>基因编辑独一无二</strong></div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="mechanisms">

      <div class="mech-card">
        <div class="mech-top"><span class="mech-icon">💧</span><span class="mech-title">三颗心脏</span></div>
        <div class="mech-text">一颗主泵全身，两颗给鳃加压，永不罢工的三核动力系统</div>
      </div>

      <div class="mech-card">
        <div class="mech-top"><span class="mech-icon">🍬</span><span class="mech-title">蓝色血液</span></div>
        <div class="mech-text">含铜血蓝蛋白替代血红蛋白，低氧深海中输氧效率更高</div>
      </div>

      <div class="mech-card">
        <div class="mech-top"><span class="mech-icon">⚗️</span><span class="mech-title">九脑分布</span></div>
        <div class="mech-text">中央脑+8条腕足各一脑，每条腕足可独立感知和决策</div>
      </div>

      <div class="mech-card">
        <div class="mech-top"><span class="mech-icon">🍋</span><span class="mech-title">RNA自编辑</span></div>
        <div class="mech-text">大规模改写自身RNA，相当于给基因打实时补丁，地球生物中独一无二</div>
      </div>
    </div>

    <div class="fun-fact">
      <span class="fun-icon">💡</span>
      <div class="fun-content">
        <div class="fun-label">冷知识</div>
        <div class="fun-text">章鱼腕足被切断后，断肢能独自捕食近一小时</div>
      </div>
    </div>

    <div class="footer">
      <div class="footer-left">
        <div class="footer-dot"></div>
        <span class="footer-date">2026年5月23日</span>
      </div>
      <div class="footer-right">智囊团团 & 2号位</div>
    </div>

  </div>
</body>
</html>
