<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>为什么古代中国曾用贝壳当货币？</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #F7EDE3;
      display: flex;
      justify-content: center;
      padding: 40px;
      min-height: 100vh;
      min-width: 620px;
      overflow-x: hidden;
    }

    /* 3:4 卡片 宽540px，高度自适应 */
    .card {
      width: 540px;
      min-width: 540px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.15);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ── 顶部栏 ── */
    .top-bar {
      background: #3E1F00;
      padding: 16px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .top-bar .series {
      font-size: 11px;
      color: #D4845A;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 600;
    }
    .top-bar .issue {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 1px;
    }

    /* ── Hero 区 ── */
    .hero {
      background: linear-gradient(160deg, #3E1F00 0%, #7A3D00 60%, #D4845A 100%);
      padding: 36px 32px 32px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: "?";
      position: absolute;
      right: 10px;
      bottom: -20px;
      font-size: 160px;
      font-weight: 900;
      color: rgba(255,255,255,0.05);
      line-height: 1;
      font-style: italic;
    }
    .hero-tag {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      color: #F0B48A;
      font-size: 11px;
      letter-spacing: 2px;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 16px;
      text-transform: uppercase;
    }
    .hero-title {
      font-size: 30px;
      font-weight: 800;
      color: #fff;
      line-height: 1.35;
      letter-spacing: -0.5px;
    }
    .hero-title em {
      font-style: normal;
      color: #F0B48A;
    }
    .hero-sub {
      margin-top: 14px;
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      line-height: 1.6;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .hero-sub::before {
      content: "";
      display: inline-block;
      width: 24px;
      height: 1px;
      background: #D4845A;
      flex-shrink: 0;
    }

    /* ── 核心发现区 ── */
    .discovery {
      padding: 22px 32px 16px;
      flex-shrink: 0;
    }
    .discovery-label {
      font-size: 10px;
      color: #D4845A;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .discovery-fact {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }
    .fact-num {
      font-size: 56px;
      font-weight: 900;
      color: #3E1F00;
      line-height: 1;
      letter-spacing: -2px;
    }
    .fact-num span {
      font-size: 28px;
      color: #D4845A;
    }
    .fact-caption {
      font-size: 14px;
      color: #555;
      line-height: 1.6;
    }
    .fact-caption strong {
      color: #3E1F00;
      font-weight: 600;
    }

    /* ── 分割线 ── */
    .divider {
      margin: 0 32px;
      height: 1px;
      background: linear-gradient(90deg, #D4845A, transparent);
      flex-shrink: 0;
    }

    /* ── 四宫格机制 ── */
    .mechanisms {
      padding: 16px 32px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      flex-shrink: 0;
    }
    .mech-card {
      background: #FDF4EE;
      border-radius: 10px;
      padding: 12px 14px;
      border-bottom: 2px solid #E8C8A8;
    }
    .mech-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }
    .mech-icon { font-size: 18px; }
    .mech-title {
      font-size: 13px;
      font-weight: 700;
      color: #3E1F00;
    }
    .mech-text {
      font-size: 11px;
      color: #777;
      line-height: 1.5;
    }

    /* ── 趣味冷知识 ── */
    .fun-fact {
      margin: 0 32px 20px;
      background: linear-gradient(135deg, #3E1F00, #7A3D00);
      border-radius: 12px;
      padding: 14px 18px;
      flex-shrink: 0;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .fun-icon {
      font-size: 20px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .fun-content {}
    .fun-label {
      font-size: 10px;
      color: #D4845A;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 5px;
    }
    .fun-text {
      font-size: 13px;
      color: rgba(255,255,255,0.85);
      line-height: 1.6;
    }

    /* ── 底部 ── */
    .footer {
      margin-top: auto;
      padding: 14px 32px;
      background: #FDF4EE;
      border-top: 1px solid #E8C8A8;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .footer-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #D4845A;
    }
    .footer-date {
      font-size: 12px;
      color: #888;
    }
    .footer-right {
      font-size: 11px;
      color: #D4845A;
      font-weight: 600;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="top-bar">
      <span class="series">每日一个为什么</span>
      <span class="issue">VOL.020 · 历史社科</span>
    </div>

    <div class="hero">
      <div class="hero-tag">🐚 历史</div>
      <div class="hero-title">为什么<br><em>古代中国曾用贝壳当货币</em></div>
      <div class="hero-sub">商朝就在用贝壳买卖东西，十贝为朋是最早货币单位</div>
    </div>

    <div class="discovery">
      <div class="discovery-label">核心发现</div>
      <div class="discovery-fact">
        <div class="fact-num">3000<span>年</span></div>
        <div class="fact-caption">汉字贝字旁的财富词汇<br><strong>都是货币制度的活化石</strong></div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="mechanisms">

      <div class="mech-card">
        <div class="mech-top"><span class="mech-icon">💧</span><span class="mech-title">天然防伪</span></div>
        <div class="mech-text">货贝外形独特、花纹统一，在铸造技术出现前难以仿制</div>
      </div>

      <div class="mech-card">
        <div class="mech-top"><span class="mech-icon">🍬</span><span class="mech-title">便携计数</span></div>
        <div class="mech-text">轻便坚固、穿绳串计，十贝为朋，是最早货币计量单位</div>
      </div>

      <div class="mech-card">
        <div class="mech-top"><span class="mech-icon">⚗️</span><span class="mech-title">稀缺性强</span></div>
        <div class="mech-text">内陆远离海洋，货贝来之不易，天然具备稀缺价值属性</div>
      </div>

      <div class="mech-card">
        <div class="mech-top"><span class="mech-icon">🍋</span><span class="mech-title">贝字财富词</span></div>
        <div class="mech-text">财贵贸赚赔购账费——汉字财富词汇几乎全含贝字旁</div>
      </div>
    </div>

    <div class="fun-fact">
      <span class="fun-icon">💡</span>
      <div class="fun-content">
        <div class="fun-label">冷知识</div>
        <div class="fun-text">汉字里财、贵、贸、赚、赔、购全含贝字旁——这是3000年前货币制度留下的语言活化石。</div>
      </div>
    </div>

    <div class="footer">
      <div class="footer-left">
        <div class="footer-dot"></div>
        <span class="footer-date">2026年5月22日</span>
      </div>
      <div class="footer-right">智囊团团 & 2号位</div>
    </div>

  </div>
</body>
</html>
