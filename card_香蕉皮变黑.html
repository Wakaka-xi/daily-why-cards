<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日一个为什么 | 香蕉</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(160deg, #1a1206 0%, #2C2416 30%, #3d2a0f 60%, #5C3D11 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  padding: 20px;
}
.card {
  width: 100%;
  max-width: 380px;
  background: #F9F6F1;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  border: 2px solid #E8D5B0;
}
.hero {
  background: linear-gradient(160deg, #2C2416 0%, #5C3D11 50%, #C9954A 100%);
  padding: 28px 24px 20px;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: "🍌";
  position: absolute;
  right: -10px;
  top: -10px;
  font-size: 120px;
  opacity: 0.15;
}
.hero-sub {
  color: rgba(255,255,255,0.7);
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.hero-title {
  color: #fff;
  font-size: 22px;
  font-weight: 700;
  line-height: 1.5;
  text-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.content {
  padding: 20px 24px 24px;
}
.stat {
  background: linear-gradient(135deg, #5C3D11, #C9954A);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.stat-num {
  font-size: 36px;
  font-weight: 800;
  color: #fff;
  text-shadow: 0 2px 6px rgba(0,0,0,0.3);
}
.stat-label {
  color: rgba(255,255,255,0.9);
  font-size: 13px;
  line-height: 1.5;
}
.mech {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 18px;
}
.mech-item {
  background: #F0EBE0;
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 12px;
  color: #3d2a0f;
  line-height: 1.5;
  border: 1px solid #E8D5B0;
}
.cold {
  background: linear-gradient(135deg, #FFF8E7, #F9F0D9);
  border-radius: 10px;
  padding: 12px 14px;
  border-left: 3px solid #C9954A;
  font-size: 12px;
  color: #5C3D11;
  line-height: 1.6;
}
.footer {
  background: linear-gradient(160deg, #C9954A 0%, #5C3D11 100%);
  padding: 12px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.footer-left { color: rgba(255,255,255,0.9); font-size: 12px; }
.footer-right { color: rgba(255,255,255,0.6); font-size: 10px; }
</style>
</head>
<body>
<div class="card">
  <div class="hero">
    <div class="hero-sub">🍌 每日一个为什么</div>
    <div class="hero-title">为什么香蕉皮放久了会变黑，<br>但里面的果肉还是好的？</div>
  </div>
  <div class="content">
    <div class="stat">
      <div class="stat-num">+20%</div>
      <div class="stat-label">黑皮香蕉比刚黄时更甜<br>乙烯把淀粉转化成了糖分</div>
    </div>
    <div class="mech">
      <div class="mech-item">🧬 多酚氧化酶启动褐变反应</div>
      <div class="mech-item">💪 乙烯催熟让果肉变甜</div>
      <div class="mech-item">🍌 皮先变色≠果肉变质</div>
      <div class="mech-item">✅ 变黑是自我保护机制</div>
    </div>
    <div class="cold">
      <strong>💡 冷知识：</strong>把香蕉挂起来保存，能减缓乙烯在果实底部聚集，让香蕉"优雅地"成熟~
    </div>
  </div>
  <div class="footer">
    <div class="footer-left">🌿 植物的智慧</div>
    <div class="footer-right">2026年4月18日</div>
  </div>
</div>
</body>
</html>
