<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>为什么地球内部是滚烫的熔岩，但地表却凉凉的？</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #FFEDE3;
      display: flex;
      justify-content: center;
      padding: 40px;
      min-height: 100vh;
      min-width: 620px;
      overflow-x: hidden;
    }

    /* 3:4 卡片 宽540px，高度自适应 */
    .card {
      width: 540px;
      min-width: 540px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.15);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ── 顶部栏 ── */
    .top-bar {
      background: #2D0A02;
      padding: 16px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .top-bar .series {
      font-size: 11px;
      color: #E65100;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 600;
    }
    .top-bar .issue {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 1px;
    }

    /* ── Hero 区 ── */
    .hero {
      background: linear-gradient(160deg, #2D0A02 0%, #8B2500 60%, #E65100 100%);
      padding: 36px 32px 32px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: "?";
      position: absolute;
      right: 10px;
      bottom: -20px;
      font-size: 160px;
      font-weight: 900;
      color: rgba(255,255,255,0.05);
      line-height: 1;
      font-style: italic;
    }
    .hero-tag {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      color: #FF8F00;
      font-size: 11px;
      letter-spacing: 2px;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 16px;
      text-transform: uppercase;
    }
    .hero-title {
      font-size: 30px;
      font-weight: 800;
      color: #fff;
      line-height: 1.35;
      letter-spacing: -0.5px;
    }
    .hero-title em {
      font-style: normal;
      color: #FF8F00;
    }
    .hero-sub {
      margin-top: 14px;
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      line-height: 1.6;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .hero-sub::before {
      content: "";
      display: inline-block;
      width: 24px;
      height: 1px;
      background: #E65100;
      flex-shrink: 0;
    }

    /* ── 核心发现区 ── */
    .discovery {
      padding: 22px 32px 16px;
      flex-shrink: 0;
    }
    .discovery-label {
      font-size: 10px;
      color: #E65100;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .discovery-fact {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }
    .fact-num {
      font-size: 56px;
      font-weight: 900;
      color: #2D0A02;
      line-height: 1;
      letter-spacing: -2px;
    }
    .fact-num span {
      font-size: 28px;
      color: #E65100;
    }
    .fact-caption {
      font-size: 14px;
      color: #555;
      line-height: 1.6;
    }
    .fact-caption strong {
      color: #2D0A02;
      font-weight: 600;
    }

    /* ── 分割线 ── */
    .divider {
      margin: 0 32px;
      height: 1px;
      background: linear-gradient(90deg, #E65100, transparent);
      flex-shrink: 0;
    }

    /* ── 四宫格机制 ── */
    .mechanisms {
      padding: 16px 32px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      flex-shrink: 0;
    }
    .mech-card {
      background: #FFF5EE;
      border-radius: 10px;
      padding: 12px 14px;
      border-bottom: 2px solid #FFCCBC;
    }
    .mech-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }
    .mech-icon { font-size: 18px; }
    .mech-title {
      font-size: 13px;
      font-weight: 700;
      color: #2D0A02;
    }
    .mech-text {
      font-size: 11px;
      color: #777;
      line-height: 1.5;
    }

    /* ── 趣味冷知识 ── */
    .fun-fact {
      margin: 0 32px 20px;
      background: linear-gradient(135deg, #2D0A02, #8B2500);
      border-radius: 12px;
      padding: 14px 18px;
      flex-shrink: 0;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .fun-icon {
      font-size: 20px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .fun-content {}
    .fun-label {
      font-size: 10px;
      color: #E65100;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 5px;
    }
    .fun-text {
      font-size: 13px;
      color: rgba(255,255,255,0.85);
      line-height: 1.6;
    }

    /* ── 底部 ── */
    .footer {
      margin-top: auto;
      padding: 14px 32px;
      background: #FFF5EE;
      border-top: 1px solid #FFCCBC;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .footer-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #E65100;
    }
    .footer-date {
      font-size: 12px;
      color: #888;
    }
    .footer-right {
      font-size: 11px;
      color: #E65100;
      font-weight: 600;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="top-bar">
      <span class="series">每日一个为什么</span>
      <span class="issue">VOL.022 · 自然地理</span>
    </div>

    <div class="hero">
      <div class="hero-tag">🌍 地球</div>
      <div class="hero-title">为什么<br><em>地球内部是滚烫的熔岩，但地表却凉凉的</em></div>
      <div class="hero-sub">地壳这层35公里厚的「超级隔热毯」挡住了所有热量</div>
    </div>

    <div class="discovery">
      <div class="discovery-label">核心发现</div>
      <div class="discovery-fact">
        <div class="fact-num">5400<span>℃</span></div>
        <div class="fact-caption">地球核心温度<br><strong>比太阳表面还热</strong></div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="mechanisms">

      <div class="mech-card">
        <div class="mech-top"><span class="mech-icon">💧</span><span class="mech-title">三层结构</span></div>
        <div class="mech-text">铁镍核心→地幔→地壳，地球像一颗巨型洋葱</div>
      </div>

      <div class="mech-card">
        <div class="mech-top"><span class="mech-icon">🍬</span><span class="mech-title">超级隔热毯</span></div>
        <div class="mech-text">35公里厚的岩石层让热量传导极慢，就像端热汤握着碗把</div>
      </div>

      <div class="mech-card">
        <div class="mech-top"><span class="mech-icon">⚗️</span><span class="mech-title">持续散热</span></div>
        <div class="mech-text">地表向宇宙辐射热量，内部补充赶不上散失速度</div>
      </div>

      <div class="mech-card">
        <div class="mech-top"><span class="mech-icon">🍋</span><span class="mech-title">5400℃核心</span></div>
        <div class="mech-text">比太阳表面还烫！但全被地壳挡在外面了</div>
      </div>
    </div>

    <div class="fun-fact">
      <span class="fun-icon">💡</span>
      <div class="fun-content">
        <div class="fun-label">冷知识</div>
        <div class="fun-text">如果地壳像纸一样薄，地面温度会超过1000℃，一切生命瞬间蒸发</div>
      </div>
    </div>

    <div class="footer">
      <div class="footer-left">
        <div class="footer-dot"></div>
        <span class="footer-date">2026年5月24日</span>
      </div>
      <div class="footer-right">智囊团团 & 2号位</div>
    </div>

  </div>
</body>
</html>
