class PPTController {
    constructor() {
        this.currentIndex = 0;
        this.slides = [];
        this.totalSlides = 0;
        this.viewport = document.getElementById('ppt-viewport');
        this.prevBtn = document.getElementById('prevBtn');
        this.nextBtn = document.getElementById('nextBtn');
        this.progressBarFill = document.getElementById('progressBarFill');
        this.pageIndicator = document.getElementById('pageIndicator');
        this.init();
    }
    init() {
        this.loadSlides();
        this.bindEvents();
        this.initializePage();
        this.updateUI();
        this.updateViewportScale();
    }
    initializePage() {
        var urlParams = new URLSearchParams(window.location.search);
        var pageParam = urlParams.get('page');
        if (!pageParam) { pageParam = '1'; urlParams.set('page', '1'); window.history.replaceState({}, '', window.location.pathname + '?' + urlParams.toString()); }
        var pageNum = parseInt(pageParam, 10);
        var targetIndex = pageNum - 1;
        if (!isNaN(pageNum) && targetIndex >= 0 && targetIndex < this.totalSlides) {
            if (this.slides[0]) this.slides[0].classList.remove('active');
            this.currentIndex = targetIndex;
            if (this.slides[targetIndex]) this.slides[targetIndex].classList.add('active');
        }
    }
    loadSlides() {
        var pageNumbers = Array.from(window.slideDataMap.keys()).sort(function(a,b){return a-b;});
        this.totalSlides = pageNumbers.length;
        var self = this;
        pageNumbers.forEach(function(pageNum, idx) {
            var slideDiv = document.createElement('div');
            slideDiv.className = 'slide';
            if (idx === 0) slideDiv.classList.add('active');
            var htmlContent = window.slideDataMap.get(pageNum);
            var contentEl = document.createElement('div');
            contentEl.innerHTML = htmlContent.trim();
            slideDiv.appendChild(contentEl);
            self.viewport.appendChild(slideDiv);
            self.slides.push(slideDiv);
        });
    }
    bindEvents() {
        var self = this;
        this.prevBtn.addEventListener('click', function(){ self.prevSlide(); });
        this.nextBtn.addEventListener('click', function(){ self.nextSlide(); });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft') self.prevSlide();
            else if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); self.nextSlide(); }
            else if (e.key === 'Home') self.goToSlide(0);
            else if (e.key === 'End') self.goToSlide(self.totalSlides - 1);
        });
        var touchStartX = 0;
        this.viewport.addEventListener('touchstart', function(e){ touchStartX = e.touches[0].clientX; });
        this.viewport.addEventListener('touchend', function(e){
            var diff = touchStartX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) { if (diff > 0) self.nextSlide(); else self.prevSlide(); }
        });
        window.addEventListener('resize', function(){ self.updateViewportScale(); });
    }
    prevSlide() { if (this.currentIndex > 0) this.goToSlide(this.currentIndex - 1); }
    nextSlide() { if (this.currentIndex < this.totalSlides - 1) this.goToSlide(this.currentIndex + 1); }
    goToSlide(index) {
        if (index < 0 || index >= this.totalSlides) return;
        this.slides[this.currentIndex].classList.remove('active');
        this.currentIndex = index;
        this.slides[this.currentIndex].classList.add('active');
        var p = new URLSearchParams(window.location.search);
        p.set('page', (index+1).toString());
        window.history.replaceState({}, '', window.location.pathname + '?' + p.toString());
        this.updateUI();
    }
    updateUI() {
        if (this.totalSlides === 0) { this.pageIndicator.textContent = '...'; return; }
        this.prevBtn.disabled = this.currentIndex === 0;
        this.nextBtn.disabled = this.currentIndex === this.totalSlides - 1;
        this.progressBarFill.style.width = ((this.currentIndex + 1) / this.totalSlides * 100) + '%';
        this.pageIndicator.textContent = (this.currentIndex + 1) + ' / ' + this.totalSlides;
    }
    updateViewportScale() {
        var scale = Math.min((window.innerWidth-40)/1440, (window.innerHeight-40)/810, 1);
        this.viewport.style.transform = 'scale(' + scale + ')';
    }
}

// Init
new PPTController();
</script>
