            --slide-background: #F8FAFC;
            --font-title: 'Montserrat', 'Noto Sans SC', sans-serif;
            --font-body: 'Inter', 'Noto Sans SC', sans-serif;
        }
    </style>
    <style>
        .nav-btn, .page-indicator {

    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter','Noto Sans SC',sans-serif;overflow:hidden;background:#fff}
        .font-title{font-family:'Montserrat','Noto Sans SC',sans-serif}
        .font-body{font-family:'Inter','Noto Sans SC',sans-serif}
        .text-primary{color:var(--primary-color)}
        .text-accent-1{color:var(--accent-color-1)}
        .text-accent-2{color:var(--accent-color-2)}
        .text-neutral{color:var(--neutral-color)}
        .bg-primary{background-color:var(--primary-color)}
        .bg-accent-1{background-color:var(--accent-color-1)}
        .bg-accent-2{background-color:var(--accent-color-2)}
        .bg-neutral{background-color:var(--neutral-color)}
        .slide-bg{background:var(--slide-background);background-size:cover;background-position:center;background-repeat:no-repeat}
        .border-primary{border-color:var(--primary-color)}
        .border-accent-1{border-color:var(--accent-color-1)}
        .border-accent-2{border-color:var(--accent-color-2)}
        .ppt-container{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:#1a1a1a;overflow:hidden;position:relative}
        .ppt-viewport{width:1440px;height:810px;position:relative;background:#fff;box-shadow:0 10px 50px rgba(0,0,0,.5);overflow:visible;transform-origin:center center;flex-shrink:0}
        .slide{width:1440px;height:810px;position:absolute;top:0;left:0;opacity:0;transition:opacity .5s ease,visibility 0s .5s}
        .slide.active{opacity:1;visibility:visible;transition:opacity .5s ease,visibility 0s}
        .nav-btn{position:fixed;top:50%;transform:translateY(-50%);width:60px;height:60px;background:rgba(255,255,255,.9);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:24px;color:#333;z-index:1000;transition:all .3s ease;box-shadow:0 4px 12px rgba(0,0,0,.15)}
        .nav-btn:hover{background:#fff;box-shadow:0 6px 20px rgba(0,0,0,.25);transform:translateY(-50%) scale(1.1)}
        .nav-btn:disabled{opacity:.3;cursor:not-allowed;transform:translateY(-50%) scale(1)}
        .nav-btn-prev{left:40px}
        .nav-btn-next{right:40px}
        .progress-bar{position:fixed;bottom:0;left:0;width:100%;height:4px;background:rgba(255,255,255,.2);z-index:1000}
        .progress-bar-fill{height:100%;background:var(--primary-color);transition:width .3s ease}
        .page-indicator{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:#fff;padding:8px 16px;border-radius:20px;font-size:14px;z-index:1000;display:block}
        .keyboard-hint{position:fixed;top:20px;right:20px;background:rgba(0,0,0,.7);color:#fff;padding:10px 15px;border-radius:8px;font-size:12px;z-index:1000;opacity:0;transition:opacity .3s ease}
        .keyboard-hint.show{opacity:1}
    </style>
